name: Validate PR20 landing tree

on:
  push:
    branches:
      - backend/f15-async-display-control

permissions:
  contents: write

concurrency:
  group: validate-pr20-landing
  cancel-in-progress: false

jobs:
  validate:
    name: Validate exact landing tree
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Check out branch without persisted credentials
        uses: actions/checkout@v4
        with:
          ref: backend/f15-async-display-control
          fetch-depth: 0
          persist-credentials: false

      - name: Remove this temporary workflow from the tree under test
        run: git rm .github/workflows/validate_pr20_landing.yml

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Test Swift packages with warnings as errors
        run: swift test -Xswiftc -warnings-as-errors

      - name: Validate frontend contract
        run: bash scripts/validate_frontend_contract.sh

      - name: Validate backend concurrency and lifecycle contract
        run: bash scripts/validate_backend_concurrency.sh

      - name: Generate project
        run: ./scripts/generate_xcodeproj.sh

      - name: Verify generated project is committed
        run: git diff --exit-code -- MyMonitor.xcodeproj/project.pbxproj

      - name: Build Debug with warnings as errors
        run: |
          xcodebuild \
            -project MyMonitor.xcodeproj \
            -scheme MyMonitor \
            -configuration Debug \
            -sdk macosx \
            -derivedDataPath build/DerivedData-Debug \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            build

      - name: Build Release with warnings as errors
        run: |
          xcodebuild \
            -project MyMonitor.xcodeproj \
            -scheme MyMonitor \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath build/DerivedData-Release \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            build

      - name: Check whitespace
        run: git diff --check

      - name: Commit the validated final tree
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove temporary landing validation workflow"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:backend/f15-async-display-control
