name: Fix and validate presentation recovery

on:
  push:
    branches:
      - backend/f15-async-display-control

permissions:
  contents: write

concurrency:
  group: fix-validate-presentation
  cancel-in-progress: false

jobs:
  fix-and-validate:
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Check out branch without persisted credentials
        uses: actions/checkout@v4
        with:
          ref: backend/f15-async-display-control
          fetch-depth: 0
          persist-credentials: false

      - name: Remove temporary workflows from the final tree
        run: |
          git rm --ignore-unmatch \
            .github/workflows/fix_validate_presentation.yml \
            .github/workflows/validate_pr20_landing.yml

      - name: Apply guarded presentation recovery fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          store = Path("MyMonitor/Presentation/DisplayPresentationStore.swift")
          text = store.read_text()
          old = '''    case .failed(let message, let canRetry):
                state = .failed(
                  DisplayPresentationFailure(message: message, canRetry: canRetry)
                )
          '''
          new = '''    case .failed(let message, let canRetry):
                activeAdjustments.removeAll()
                optimisticBrightness.removeAll()
                state = .failed(
                  DisplayPresentationFailure(message: message, canRetry: canRetry)
                )
          '''
          if text.count(old) != 1:
              raise SystemExit(f"failed-state anchor count: {text.count(old)}")
          store.write_text(text.replace(old, new, 1))

          tests = Path("MyMonitorTests/Presentation/DisplayPresentationStoreTests.swift")
          text = tests.read_text()
          anchor = '''  func testRemovingMonitorClearsItsOptimisticValue() {
          '''
          insertion = '''  func testFailedSnapshotClearsOptimisticStateBeforeRecovery() {
              let monitorID = MonitorPresentationFixtures.studioDisplayID
              let controller = FakeMonitorController(
                snapshot: MonitorPresentationFixtures.oneHardwareDisplay
              )
              let store = DisplayPresentationStore(controller: controller)

              store.beginBrightnessAdjustment(for: monitorID)
              store.updateBrightness(0.91, for: monitorID)
              controller.emit(.failed(message: "Detection failed", canRetry: true))

              var recovered = MonitorPresentationFixtures.hardwareSnapshot
              recovered.brightness = 0.34
              controller.emit(.ready([recovered]))

              assertBrightness(store.monitor(withID: monitorID)?.brightness, equals: 0.34)
            }

            func testTeardownForwardsToControllerExactlyOnce() {
              let controller = FakeMonitorController(
                snapshot: MonitorPresentationFixtures.oneHardwareDisplay
              )
              let store = DisplayPresentationStore(controller: controller)

              store.teardown()

              XCTAssertEqual(controller.teardownCount, 1)
            }

          ''' + anchor
          if text.count(anchor) != 1:
              raise SystemExit(f"test insertion anchor count: {text.count(anchor)}")
          tests.write_text(text.replace(anchor, insertion, 1))
          PY

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Test Swift packages with warnings as errors
        run: swift test -Xswiftc -warnings-as-errors

      - name: Validate frontend contract
        run: bash scripts/validate_frontend_contract.sh

      - name: Validate backend concurrency and lifecycle contract
        run: bash scripts/validate_backend_concurrency.sh

      - name: Generate project
        run: ./scripts/generate_xcodeproj.sh

      - name: Verify generated project is committed
        run: git diff --exit-code -- MyMonitor.xcodeproj/project.pbxproj

      - name: Build Debug with warnings as errors
        run: |
          xcodebuild \
            -project MyMonitor.xcodeproj \
            -scheme MyMonitor \
            -configuration Debug \
            -sdk macosx \
            -derivedDataPath build/DerivedData-Debug \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            build

      - name: Build Release with warnings as errors
        run: |
          xcodebuild \
            -project MyMonitor.xcodeproj \
            -scheme MyMonitor \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath build/DerivedData-Release \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            build

      - name: Check whitespace
        run: git diff --check

      - name: Commit the exact validated landing tree
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MyMonitor/Presentation/DisplayPresentationStore.swift \
            MyMonitorTests/Presentation/DisplayPresentationStoreTests.swift
          git commit -m "Clear stale presentation state after detection failure"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:backend/f15-async-display-control
