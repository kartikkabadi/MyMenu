name: Build MyMonitor

on:
  pull_request:
  push:
    branches:
      - rescue/monitor-only-core

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Xcode 26 build
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Generate project
        run: ./scripts/generate_xcodeproj.sh

      - name: Build Debug
        run: |
          xcodebuild \
            -project MyMonitor.xcodeproj \
            -scheme MyMonitor \
            -configuration Debug \
            -sdk macosx \
            -derivedDataPath build/DerivedData \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Check whitespace
        run: git diff --check
