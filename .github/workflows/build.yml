name: Apply mode-routing fixes

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Apply guarded source fixes
        run: |
          python3 scripts/apply_mode_iokit_fix.py
          rm scripts/apply_mode_iokit_fix.py

      - name: Generate project
        run: ./scripts/generate_xcodeproj.sh

      - name: Test and validate contracts
        run: |
          swift test -Xswiftc -warnings-as-errors
          bash scripts/validate_frontend_contract.sh
          bash scripts/validate_backend_concurrency.sh
          git diff --check

      - name: Build Debug and Release with warnings as errors
        run: |
          for configuration in Debug Release; do
            xcodebuild \
              -project MyMonitor.xcodeproj \
              -scheme MyMonitor \
              -configuration "$configuration" \
              -sdk macosx \
              -derivedDataPath "build/DerivedData-$configuration" \
              ARCHS=arm64 \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGNING_ALLOWED=NO \
              SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
              build
          done

      - name: Commit only validated source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            MyMonitor/Core/DisplayRouter.swift \
            MyMonitor/ThirdParty/Arm64DDC.swift \
            MyMonitor.xcodeproj/project.pbxproj
          git add -u scripts/apply_mode_iokit_fix.py
          git commit -m "Fix display-mode routing and IORegistry extraction"
          git push origin HEAD:${{ github.head_ref }}
