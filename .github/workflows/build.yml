name: Apply router lifetime fixes

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Narrow the guarded observer anchor
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/apply_router_lifetime_fix.py")
          text = path.read_text()
          old = '''    """    NotificationCenter.default.addObserver(
          """,
              """    defaultNotificationObservers.append(NotificationCenter.default.addObserver(
          """,
          '''
          new = '''    """    NotificationCenter.default.addObserver(
              forName: NSApplication.didChangeScreenParametersNotification,
          """,
              """    defaultNotificationObservers.append(NotificationCenter.default.addObserver(
              forName: NSApplication.didChangeScreenParametersNotification,
          """,
          '''
          if text.count(old) != 1:
              raise RuntimeError(f"observer script anchor: expected one match, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Run guarded router lifetime patch
        id: patch
        shell: bash
        run: |
          set +e
          python3 scripts/apply_router_lifetime_fix.py > router-lifetime-patch.log 2>&1
          status=$?
          cat router-lifetime-patch.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [[ "$status" == "0" ]]; then
            rm scripts/apply_router_lifetime_fix.py
          fi
          exit 0

      - name: Upload patch diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-lifetime-patch-diagnostic
          path: router-lifetime-patch.log

      - name: Stop on guarded patch failure
        if: steps.patch.outputs.status != '0'
        run: exit 1

      - name: Generate project
        run: ./scripts/generate_xcodeproj.sh

      - name: Test and validate contracts
        run: |
          swift test -Xswiftc -warnings-as-errors
          bash scripts/validate_frontend_contract.sh
          bash scripts/validate_backend_concurrency.sh
          git diff --check

      - name: Build Debug and Release with warnings as errors
        run: |
          for configuration in Debug Release; do
            xcodebuild \
              -project MyMonitor.xcodeproj \
              -scheme MyMonitor \
              -configuration "$configuration" \
              -sdk macosx \
              -derivedDataPath "build/DerivedData-$configuration" \
              ARCHS=arm64 \
              ONLY_ACTIVE_ARCH=NO \
              CODE_SIGNING_ALLOWED=NO \
              SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
              build
          done

      - name: Commit only validated source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            MyMonitor/Core/DisplayRouter.swift \
            scripts/validate_backend_concurrency.sh \
            MyMonitor.xcodeproj/project.pbxproj
          git add -u scripts/apply_router_lifetime_fix.py
          git commit -m "Own and terminate display observation lifetime"
          git push origin HEAD:${{ github.head_ref }}
