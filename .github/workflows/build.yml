name: Build MyMonitor

on:
  pull_request:
  push:
    branches:
      - rescue/monitor-only-core

permissions:
  contents: write

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Tests, contracts, and Xcode 26 builds
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Test presentation layer
        run: swift test

      - name: Validate frontend contract
        run: bash scripts/validate_frontend_contract.sh

      - name: Validate backend concurrency
        run: bash scripts/validate_backend_concurrency.sh

      - name: Generate project
        run: ./scripts/generate_xcodeproj.sh

      - name: Commit generated project once
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- MyMonitor.xcodeproj/project.pbxproj; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MyMonitor.xcodeproj/project.pbxproj
          git commit -m "Regenerate Xcode project"
          git push origin HEAD:${{ github.head_ref }}

      - name: Build Debug
        run: |
          xcodebuild \
            -project MyMonitor.xcodeproj \
            -scheme MyMonitor \
            -configuration Debug \
            -sdk macosx \
            -derivedDataPath build/DerivedData-Debug \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build Release
        run: |
          xcodebuild \
            -project MyMonitor.xcodeproj \
            -scheme MyMonitor \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath build/DerivedData-Release \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Check whitespace
        run: git diff --check
